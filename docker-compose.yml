services:
  # ── Temporary DB Migrator ───────────────────────────
  migrator:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install prisma && npx prisma db push --accept-data-loss"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - dokploy-network
    volumes:
      - ./prisma:/app/prisma

  # ── Main Web App ────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
        - BETTER_AUTH_URL=${BETTER_AUTH_URL}
        - GEMINI_API_KEY=${GEMINI_API_KEY}
        - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
        - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    env_file:
      - .env
    environment:
      - SANDBOX_URL=http://sandbox:4000
      - HOSTNAME=0.0.0.0
    depends_on:
      sandbox:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Browser Sandbox (Playwright) ────────────────────
  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=4000
      - ARTIFACTS_DIR=/artifacts
    volumes:
      - sandbox-artifacts:/artifacts
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  sandbox-artifacts:
    driver: local

networks:
  dokploy-network:
    external: true

