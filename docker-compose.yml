services:
  # ── Main Web App ────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
        - BETTER_AUTH_URL=${BETTER_AUTH_URL}
        - GEMINI_API_KEY=${GEMINI_API_KEY}
        - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
        - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    env_file:
      - .env
    environment:
      - SANDBOX_URL=http://sandbox:4000
      - HOSTNAME=0.0.0.0
    depends_on:
      sandbox:
        condition: service_healthy
      hermes:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.calmant-web.rule=Host(`calmanttest.aaaryan.space`)
      - traefik.http.routers.calmant-web.entrypoints=websecure
      - traefik.http.routers.calmant-web.tls.certresolver=letsencrypt
      - traefik.http.services.calmant-web.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Browser Sandbox (Playwright) ────────────────────
  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=4000
      - ARTIFACTS_DIR=/artifacts
    volumes:
      - sandbox-artifacts:/artifacts
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ── Hermes Agent (Isolated Profiles) ───────────────
  hermes:
    build:
      context: ./hermes-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - hermes-data:/root/.hermes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  sandbox-artifacts:
    driver: local
  hermes-data:
    driver: local

networks:
  dokploy-network:
    external: true

