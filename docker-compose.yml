services:
  # ── Main Web App ────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    env_file:
      - .env
    environment:
      - HERMES_URL=http://hermes:8000
      - SANDBOX_URL=http://sandbox:4000
      - NEXT_PUBLIC_SANDBOX_URL=/sandbox-api
      - HOSTNAME=0.0.0.0
    depends_on:
      sandbox:
        condition: service_healthy
      hermes:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.calmant-web.rule=Host(`calmant.aaaryan.space`)
      - traefik.http.routers.calmant-web.entrypoints=websecure
      - traefik.http.routers.calmant-web.tls.certresolver=letsencrypt
      - traefik.http.services.calmant-web.loadbalancer.server.port=3000
      - traefik.docker.network=dokploy-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Browser Sandbox (Playwright) ────────────────────
  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=4000
      - ARTIFACTS_DIR=/artifacts
    volumes:
      - sandbox-artifacts:/artifacts
    networks:
      - default
      - dokploy-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ── Hermes Agent (Isolated Profiles) ───────────────
  hermes:
    build:
      context: ./hermes-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - HERMES_PROVIDER=openrouter
      - HERMES_INFERENCE_MODEL=openrouter/free
      - DATABASE_URL=${DATABASE_URL}
      - SANDBOX_URL=http://sandbox:4000
      - HERMES_INTERNAL_API_SECRET=${HERMES_INTERNAL_API_SECRET}
      - WEB_URL=http://web:3000
    volumes:
      - hermes-data:/root/.hermes
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  sandbox-artifacts:
    driver: local
  hermes-data:
    driver: local

networks:
  dokploy-network:
    external: true
